name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Auto-generate test files
        run: |
          auto-test-gen demo_inputs --out tests_output --module demo_inputs

      - name: Run Pytest with Coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Generate XML for machines and HTML for humans
          pytest tests_output/ --cov=demo_inputs --cov-report=term-missing --cov-report=xml --cov-report=html:htmlcov | tee coverage_output.txt

      - name: Generate Job Summary
        if: always()
        run: |
          echo "### 📊 Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          sed -n '/Name *Stmts *Miss *Cover/,/TOTAL/p' coverage_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> [!TIP]" >> $GITHUB_STEP_SUMMARY
          echo "> To see **line-by-line details** (which lines are green/red), download the **html-coverage-report** from the Artifacts section below." >> $GITHUB_STEP_SUMMARY

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-coverage-report
          path: htmlcov/
