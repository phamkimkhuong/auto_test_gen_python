name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Auto-generate test files and run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # The tool now handles PYTHONPATH automatically, but we also set it here for the manual pytest call
          auto-test-gen demo_inputs --run --report html
          # We also run coverage manually for the CI summary output
          pytest tests_output/ --cov=demo_inputs --cov-report=term-missing | tee coverage_output.txt

      - name: Generate Job Summary
        if: always()
        run: |
          echo "### Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage_output.txt ]; then
            echo '```text' >> $GITHUB_STEP_SUMMARY
            sed -n '/Name *Stmts *Miss *Cover/,/TOTAL/p' coverage_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage output was not generated." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> [!IMPORTANT]  " >> $GITHUB_STEP_SUMMARY
          echo "> Download **test-results-package** in the Artifacts section below to see the **Professional Test Dashboard** and line-by-line coverage details." >> $GITHUB_STEP_SUMMARY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-package
          path: |
            test_dashboard.html
            htmlcov/
