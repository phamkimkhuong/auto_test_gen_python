name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Auto-generate test files for demo inputs
      run: |
        python -m core_engine.cli demo_inputs --out tests_output --module demo_inputs
        
    - name: Run Pytest with Coverage
      run: |
        # Set python path so the tests can import demo_inputs correctly
        export PYTHONPATH=$(pwd):$PYTHONPATH
        pytest tests_output/ --cov=demo_inputs --cov-report=term-missing --cov-report=xml
