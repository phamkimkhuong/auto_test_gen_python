name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Auto-generate test files
        run: |
          auto-test-gen demo_inputs --out tests_output --module demo_inputs

      - name: Run Pytest with Coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Run tests and capture output to a file
          pytest tests_output/ --cov=demo_inputs --cov-report=term-missing --cov-report=xml | tee coverage_output.txt

      - name: Generate Job Summary
        if: always()
        run: |
          echo "### 📊 Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          # Extract only the coverage table using sed
          sed -n '/Name *Stmts *Miss *Cover/,/TOTAL/p' coverage_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> [!TIP]" >> $GITHUB_STEP_SUMMARY
          echo "> To see line-by-line details, download the full **html-coverage-report** from the Artifacts section below." >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: error
